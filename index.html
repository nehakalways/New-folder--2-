<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Document</title>
</head>

<body>

<h1>Task list</h1>

<ul id="list">
<li>Task 1</li>
<li>Task 2</li>
<li>Task 3</li>
</ul>

<script>
const list = document.querySelector("#list");

list.addEventListener("click", function (e) {
    if (e.target.tagName === "LI") {
        e.target.style.textDecoration = "line-through";
    }
});
</script>

</body>
</html>
